    for (var i = 0; i < clozeQuestions.length; i++) { var q = clozeQuestions[i];
        html += '<div class="card" data-qid="clz_' + q.id + '" data-correct="' + q.correct + '" data-exp="' + escapeHtml(q.exp) + '" data-note="' + escapeHtml(q.note) + '"><div class="question-panel"><div class="question-text">' + q.id + '. </div><div class="options-list">';
        for (var j = 0; j < q.opts.length; j++) { var opt = q.opts[j];
            html += '<div class="option" data-val="' + opt[0] + '"><div class="option-letter">' + opt[0] + '</div><div class="option-text">' + escapeHtml(opt) + '</div></div>';
        }
        html += '</div></div><div class="feedback-area" style="display:none;"></div></div>';
    }
    
    // 高频短语板块
    html += '<div class="card"><div class="analysis-special"><div class="analysis-title">📚 高频搭配 & 核心短语 · 长难句精析</div><div class="phrase-list"><strong style="display:block; margin-bottom:14px;">🔖 常考短语 (含释义+例句)</strong>';
    for (var i = 0; i < phraseList.length; i++) { var p = phraseList[i];
        html += '<div class="phrase-item"><div class="phrase-text"><span class="phrase-en">' + escapeHtml(p.phrase) + '</span><span class="phrase-zh">' + escapeHtml(p.meaning) + '</span></div><div class="phrase-example">💬 ' + escapeHtml(p.example) + '</div></div>';
    }
    html += '</div><div class="sentence-list"><strong style="display:block; margin:20px 0 14px;">🧩 长难句 + 语法分析</strong>';
    for (var i = 0; i < longSentences.length; i++) { var ls = longSentences[i];
        html += '<div class="sentence-item"><div class="sentence-en">📖 ' + escapeHtml(ls.sentence) + '</div><div class="sentence-zh">📝 中文：' + escapeHtml(ls.trans) + '</div><div class="sentence-grammar">📌 语法解析：' + escapeHtml(ls.analysis) + '</div></div>';
    }
    html += '</div></div></div>';
    
    // 解题策略
    html += strategyBlock;
    
    // 难词表（可编辑）
    html += '<div class="card" style="padding:16px 22px 22px 22px;"><div class="section-title-icon">📘 我的难词表 · 自主复习</div><table class="vocab-table"><thead><tr><th>序号</th><th>单词</th><th>词性及释义</th><th>我的笔记</th></tr></thead><tbody id="vocabTbody">';
    for (var i = 0; i < 10; i++) { html += '<tr><td>' + (i+1) + '</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>'; }
    html += '</tbody></table><div class="section-title-icon" style="margin-top:24px;">📜 长难句积累 · 语料库</div><table class="sentence-table"><thead><tr><th>序号</th><th>长难句</th><th>备注（翻译/结构分析）</th></tr></thead><tbody id="sentenceTbody">';
    for (var i = 0; i < 5; i++) { html += '<tr><td>' + (i+1) + '</td><td contenteditable="true" class="editable-cell"></td><td contenteditable="true" class="editable-cell"></td></tr>'; }
    html += '</tbody><td><div style="font-size:0.7rem; color:#8aa998; margin-top:12px;">✏️ 点击单元格即可填写，自由记录难词和长难句分析，方便复习。</div></div>';
    
    root.innerHTML = html;
    
    // 使可点击
    var passageDiv = document.getElementById("clozePassage");
    if (passageDiv) makeWordsClickable(passageDiv);
    document.querySelectorAll(".question-text, .option-text, .phrase-item, .sentence-item, .method-card, .phrase-example, .sentence-en, .sentence-zh").forEach(function(el) { if (el) makeWordsClickable(el); });
    
    // 绑定选择题事件
    document.querySelectorAll('.card[data-qid]').forEach(function(card) {
        var correct = card.getAttribute('data-correct');
        var exp = card.getAttribute('data-exp') || "根据上下文分析得出。";
        var note = card.getAttribute('data-note') || "注意固定搭配与逻辑衔接。";
        var optsDiv = card.querySelector('.options-list');
        if (!optsDiv) return;
        var opts = optsDiv.querySelectorAll('.option');
        opts.forEach(function(opt) {
            opt.addEventListener('click', function() {
                if (card.classList.contains('answered')) return;
                var selected = opt.getAttribute('data-val');
                var isCorrect = (selected === correct);
                var fb = card.querySelector('.feedback-area');
                if (!fb) return;
                var yourFull = selected, correctFull = correct;
                opts.forEach(function(o) { if(o.getAttribute('data-val') === selected) yourFull = o.querySelector('.option-text')?.innerText || selected; if(o.getAttribute('data-val') === correct) correctFull = o.querySelector('.option-text')?.innerText || correct; });
                fb.innerHTML = '<div class="result-badge ' + (isCorrect ? 'correct-badge' : 'wrong-badge') + '">' + (isCorrect ? '✔ 回答正确' : '❌ 回答错误') + '</div><div class="answer-compare"><div class="your-answer">📌 你的答案：' + selected + '. ' + escapeHtml(yourFull) + '</div><div class="correct-answer">✅ 正确答案：' + correct + '. ' + escapeHtml(correctFull) + '</div></div><div class="detail-explanation"><strong>🔎 详细解析：</strong> ' + escapeHtml(exp) + '<br/><strong>📘 考点笔记：</strong> ' + escapeHtml(note) + '</div><div class="lock-message">🔒 答案已锁定，不可修改</div>';
                fb.style.display = 'block';
                card.classList.add('answered');
                opts.forEach(function(o) { o.classList.add('disabled-opt'); });
            });
        });
    });
</script>
</body>
</html>
